name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: GOEXPERIMENT=runtimesecret go test ./...
      - run: GOEXPERIMENT=runtimesecret go vet ./...

      # Verify build with both KMS tags compiles
      - run: |
          go work init && go work use . ./awskms ./gcpkms
          GOEXPERIMENT=runtimesecret go build -tags "kms,gcpkms" -o /dev/null .
      - run: GOEXPERIMENT=runtimesecret go test -tags "kms,gcpkms" ./... ./awskms/ ./gcpkms/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: ko-build/setup-ko@v0.9

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare go.work for KMS modules
        run: go work init && go work use . ./awskms ./gcpkms

      - name: Build and push image with ko
        env:
          KO_DOCKER_REPO: ghcr.io/akhenakh/csi-secret-age
          KMS_ENABLED: "true"
          GCPKMS_ENABLED: "true"
        run: |
          TAGS="--tags ${{ github.ref_name }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="$TAGS --tags latest"
          fi
          ko build --bare $TAGS .
