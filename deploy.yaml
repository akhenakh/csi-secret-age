apiVersion: v1
kind: Secret
metadata:
  name: age-master-key
  namespace: kube-system
stringData:
  # Generated using `age-keygen`
  MASTER_KEY: "AGE-SECRET-KEY-1..."
---
# Optional: AWS KMS encrypted age master key ciphertext.
# When using AWS KMS, set KMS_CIPHERTEXT instead of MASTER_KEY
# and build the image with --build-arg KMS_ENABLED=true.
# The ciphertext is generated with:
#   aws kms encrypt --key-id <arn> --plaintext fileb://key.txt --output text --query CiphertextBlob
# apiVersion: v1
# kind: Secret
# metadata:
#   name: age-kms-ciphertext
#   namespace: kube-system
# stringData:
#   ciphertext: "<base64-encoded-blob>"
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-public-key
  namespace: kube-system
stringData:
  # PEM-encoded RSA public key used to validate JWT tokens from the Web UI
  JWT_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...
    -----END PUBLIC KEY-----
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: age-vault-perms
  namespace: kube-system
data:
  perm.yaml: |
    userA:
      - "/nats/*"
      - "/postgresql/*"
    userB:
      - "/app/*"
    admin:
      - userH
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: age-vault-csi-sa
  namespace: kube-system
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: age-vault-csi-role
rules:
  # Allows reading and updating the backed Kubernetes Secret containing the Vault
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["age-vault-backend"]
    verbs: ["get", "create", "update"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: age-vault-csi-binding
subjects:
  - kind: ServiceAccount
    name: age-vault-csi-sa
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: age-vault-csi-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: age-vault-csi
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: age-vault-csi
  template:
    metadata:
      labels:
        app: age-vault-csi
    spec:
      serviceAccountName: age-vault-csi-sa
      hostNetwork: true
      containers:
        - name: csi-driver
          image: age-vault-csi:latest
          env:
            - name: MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: age-master-key
                  key: MASTER_KEY
            # Uncomment to use AWS KMS instead of MASTER_KEY:
            # - name: KMS_CIPHERTEXT
            #   valueFrom:
            #     secretKeyRef:
            #       name: age-kms-ciphertext
            #       key: ciphertext
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-public-key
                  key: JWT_PUBLIC_KEY
            - name: PERM_CONFIG_PATH
              value: /etc/age-vault/perm.yaml
            - name: SOCKET_PATH
              value: /csi/agevault.sock
          volumeMounts:
            - name: providers-socket-dir
              mountPath: /csi
            - name: perms-config
              mountPath: /etc/age-vault
      volumes:
        - name: providers-socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/secrets-store.csi.k8s.io/providers
            type: DirectoryOrCreate
        - name: perms-config
          configMap:
            name: age-vault-perms
