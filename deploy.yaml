# Master key (file/env) mode. Uncomment to use a raw age key instead of KMS.
# apiVersion: v1
# kind: Secret
# metadata:
#   name: age-master-key
#   namespace: kube-system
# stringData:
#   # Generated using `age-keygen`
#   key.txt: "AGE-SECRET-KEY-1..."
# ---
# AWS KMS encrypted age master key ciphertext.
# When using AWS KMS, set KMS_CIPHERTEXT_FILE instead of MASTER_KEY_FILE
# and build the image with --build-arg KMS_ENABLED=true.
# The ciphertext is generated with:
#   aws kms encrypt --key-id <arn> --plaintext fileb://key.txt --output text --query CiphertextBlob
apiVersion: v1
kind: Secret
metadata:
  name: age-kms-ciphertext
  namespace: kube-system
stringData:
  ciphertext: ""
---
# Optional: GCP KMS encrypted age master key ciphertext.
# When using GCP KMS, set GCP_KMS_KEY_NAME_FILE and GCP_KMS_CIPHERTEXT_FILE
# instead of MASTER_KEY_FILE and build with --build-arg GCPKMS_ENABLED=true.
# The ciphertext is generated with:
#   gcloud kms encrypt --location global --keyring my-keyring --key my-key --plaintext-file key.txt --ciphertext-file - | base64 -w0
# apiVersion: v1
# kind: Secret
# metadata:
#   name: age-gcpkms-ciphertext
#   namespace: kube-system
# stringData:
#   ciphertext: "<base64-encoded-blob>"
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: age-gcpkms-key
#   namespace: kube-system
# stringData:
#   keyName: "projects/my-project/locations/global/keyRings/my-keyring/cryptoKeys/my-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-public-key
  namespace: kube-system
stringData:
  # PEM-encoded RSA public key used to validate JWT tokens from the Web UI
  jwt-public-key.pem: |
    -----BEGIN PUBLIC KEY-----
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...
    -----END PUBLIC KEY-----
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: csi-secret-age-perms
  namespace: kube-system
data:
  perm.yaml: |
    admin_users:
      - userH
    user_permissions:
      userA:
        - "/nats/*"
        - "/postgresql/*"
      userB:
        - "/app/*"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-secret-age-sa
  namespace: kube-system
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: csi-secret-age-role
rules:
  # Allows reading and updating the backed Kubernetes Secret containing the Vault
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["csi-secret-age-backend"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: csi-secret-age-binding
subjects:
  - kind: ServiceAccount
    name: csi-secret-age-sa
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: csi-secret-age-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: csi-secret-age
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: csi-secret-age
  template:
    metadata:
      labels:
        app: csi-secret-age
    spec:
      serviceAccountName: csi-secret-age-sa
      hostNetwork: true
      containers:
        - name: csi-driver
          image: ghcr.io/akhenakh/csi-secret-age:latest
          # Built with ko on every main merge. Re-pin to an immutable @sha256 digest once stable.
          imagePullPolicy: Always
          env:
            # - name: MASTER_KEY_FILE
            #   value: /etc/csi-secret-age/secrets/master-key/key.txt
            # AWS KMS: the secret is mounted at /etc/csi-secret-age/secrets/kms
            # and its "ciphertext" key becomes the file below.
            - name: KMS_CIPHERTEXT_FILE
              value: /etc/csi-secret-age/secrets/kms/ciphertext
            # Uncomment to use GCP KMS instead of MASTER_KEY_FILE:
            # - name: GCP_KMS_KEY_NAME_FILE
            #   value: /etc/csi-secret-age/secrets/gcpkms/keyName
            # - name: GCP_KMS_CIPHERTEXT_FILE
            #   value: /etc/csi-secret-age/secrets/gcpkms/ciphertext
            # --- Web UI authentication -------------------------------------
            # Pick ONE model below. See README_JWT.md for the full guide.
            #
            # (a) Static RSA public key (CLI clients send a signed RS256 JWT):
            - name: JWT_PUBLIC_KEY_FILE
              value: /etc/csi-secret-age/secrets/jwt/jwt-public-key.pem
            #
            # (b) Google SSO via Envoy Gateway OIDC (recommended for browsers).
            #     The gateway forwards the OIDC access token (forwardAccessToken),
            #     and the pod resolves it to an email via the provider's UserInfo
            #     endpoint (discovered from JWT_ISSUER). Leave JWT_USER_HEADER
            #     UNSET so there is no spoofable trusted header.
            #     See the SecurityPolicy / HTTPRoute example at the end of this file.
            # - name: JWT_ISSUER
            #   value: "https://accounts.google.com"
            # - name: JWT_USER_CLAIM
            #   value: "email"
            # - name: OAUTH_USERINFO_CACHE_TTL
            #   value: "5m"
            #   # Optional: also accept self-contained Bearer JWTs (e.g. from CLI
            #   # clients). When set, these get audience-bound validation.
            # - name: JWT_JWKS_URL
            #   value: "https://www.googleapis.com/oauth2/v3/certs"
            # - name: JWT_AUDIENCE
            #   value: "387398432539-xxx.apps.googleusercontent.com"
            # ---------------------------------------------------------------
            - name: PERM_CONFIG_PATH
              value: /etc/csi-secret-age/perm.yaml
            - name: SOCKET_PATH
              value: /csi/csi-secret-age.sock
          volumeMounts:
            - name: providers-socket-dir
              mountPath: /csi
            - name: perms-config
              mountPath: /etc/csi-secret-age
            - name: kms-ciphertext-secret
              mountPath: /etc/csi-secret-age/secrets/kms
              readOnly: true
            - name: jwt-public-key-secret
              mountPath: /etc/csi-secret-age/secrets/jwt
              readOnly: true
      volumes:
        - name: providers-socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/secrets-store.csi.k8s.io/providers
            type: DirectoryOrCreate
        - name: perms-config
          configMap:
            name: csi-secret-age-perms
        - name: kms-ciphertext-secret
          secret:
            secretName: age-kms-ciphertext
        - name: jwt-public-key-secret
          secret:
            secretName: jwt-public-key
---
# ============================================================================
# OPTIONAL: Expose the Web UI behind Envoy Gateway with Google SSO (OIDC).
#
# Flow: browser -> Envoy Gateway (OIDC login at Google) -> forwards the OAuth2
# access token as `Authorization: Bearer ...` -> the pod resolves it to an
# email via Google's UserInfo endpoint (see env model (b) above).
#
# Requires the Gateway API + Envoy Gateway CRDs. Adjust hostnames, the parent
# Gateway/listener, and the clientID to your environment.
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: csi-secret-age-admin
  namespace: kube-system
spec:
  selector:
    app: csi-secret-age
  ports:
    - name: http
      port: 8090
      targetPort: 8090
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: csi-secret-age-google-oidc
  namespace: kube-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: csi-secret-age-admin
  oidc:
    provider:
      issuer: "https://accounts.google.com"
    clientID: "387398432539-xxx.apps.googleusercontent.com"
    clientSecret:
      name: "csi-secret-age-google-oidc-secret" # Secret must hold key "client-secret"
    scopes: ["email"]                            # else Google omits the email claim
    redirectURL: "https://vault.example.com/oauth2/callback" # register this in the Google OAuth client
    # forwardAccessToken makes Envoy send the OIDC access token upstream as
    # `Authorization: Bearer ...`; the pod validates it via the UserInfo endpoint.
    forwardAccessToken: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: csi-secret-age-admin
  namespace: kube-system
spec:
  parentRefs:
    - name: eg                       # your Gateway name
      namespace: envoy-gateway-system
      sectionName: https             # the listener whose hostname matches below
  hostnames:
    - "vault.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: csi-secret-age-admin
          namespace: kube-system
          port: 8090
