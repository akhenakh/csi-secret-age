apiVersion: v1
kind: Secret
metadata:
  name: age-master-key
  namespace: kube-system
stringData:
  # Generated using `age-keygen`
  key.txt: "AGE-SECRET-KEY-1..."
---
# Optional: AWS KMS encrypted age master key ciphertext.
# When using AWS KMS, set KMS_CIPHERTEXT_FILE instead of MASTER_KEY_FILE
# and build the image with --build-arg KMS_ENABLED=true.
# The ciphertext is generated with:
#   aws kms encrypt --key-id <arn> --plaintext fileb://key.txt --output text --query CiphertextBlob
# apiVersion: v1
# kind: Secret
# metadata:
#   name: age-kms-ciphertext
#   namespace: kube-system
# stringData:
#   ciphertext: "<base64-encoded-blob>"
# ---
# Optional: GCP KMS encrypted age master key ciphertext.
# When using GCP KMS, set GCP_KMS_KEY_NAME_FILE and GCP_KMS_CIPHERTEXT_FILE
# instead of MASTER_KEY_FILE and build with --build-arg GCPKMS_ENABLED=true.
# The ciphertext is generated with:
#   gcloud kms encrypt --location global --keyring my-keyring --key my-key --plaintext-file key.txt --ciphertext-file - | base64 -w0
# apiVersion: v1
# kind: Secret
# metadata:
#   name: age-gcpkms-ciphertext
#   namespace: kube-system
# stringData:
#   ciphertext: "<base64-encoded-blob>"
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: age-gcpkms-key
#   namespace: kube-system
# stringData:
#   keyName: "projects/my-project/locations/global/keyRings/my-keyring/cryptoKeys/my-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-public-key
  namespace: kube-system
stringData:
  # PEM-encoded RSA public key used to validate JWT tokens from the Web UI
  jwt-public-key.pem: |
    -----BEGIN PUBLIC KEY-----
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...
    -----END PUBLIC KEY-----
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: age-vault-perms
  namespace: kube-system
data:
  perm.yaml: |
    userA:
      - "/nats/*"
      - "/postgresql/*"
    userB:
      - "/app/*"
    admin:
      - userH
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: age-vault-csi-sa
  namespace: kube-system
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: age-vault-csi-role
rules:
  # Allows reading and updating the backed Kubernetes Secret containing the Vault
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["age-vault-backend"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: age-vault-csi-binding
subjects:
  - kind: ServiceAccount
    name: age-vault-csi-sa
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: age-vault-csi-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: age-vault-csi
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: age-vault-csi
  template:
    metadata:
      labels:
        app: age-vault-csi
    spec:
      serviceAccountName: age-vault-csi-sa
      hostNetwork: true
      containers:
        - name: csi-driver
          image: age-vault-csi:latest
          env:
            - name: MASTER_KEY_FILE
              value: /etc/age-vault/secrets/master-key/key.txt
            # Uncomment to use AWS KMS instead of MASTER_KEY_FILE:
            # - name: KMS_CIPHERTEXT_FILE
            #   value: /etc/age-vault/secrets/kms/ciphertext
            # Uncomment to use GCP KMS instead of MASTER_KEY_FILE:
            # - name: GCP_KMS_KEY_NAME_FILE
            #   value: /etc/age-vault/secrets/gcpkms/keyName
            # - name: GCP_KMS_CIPHERTEXT_FILE
            #   value: /etc/age-vault/secrets/gcpkms/ciphertext
            - name: JWT_PUBLIC_KEY_FILE
              value: /etc/age-vault/secrets/jwt/jwt-public-key.pem
            - name: PERM_CONFIG_PATH
              value: /etc/age-vault/perm.yaml
            - name: SOCKET_PATH
              value: /csi/agevault.sock
          volumeMounts:
            - name: providers-socket-dir
              mountPath: /csi
            - name: perms-config
              mountPath: /etc/age-vault
            - name: master-key-secret
              mountPath: /etc/age-vault/secrets/master-key
              readOnly: true
            - name: jwt-public-key-secret
              mountPath: /etc/age-vault/secrets/jwt
              readOnly: true
      volumes:
        - name: providers-socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/secrets-store.csi.k8s.io/providers
            type: DirectoryOrCreate
        - name: perms-config
          configMap:
            name: age-vault-perms
        - name: master-key-secret
          secret:
            secretName: age-master-key
        - name: jwt-public-key-secret
          secret:
            secretName: jwt-public-key
