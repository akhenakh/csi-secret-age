# Master key (file/env) mode. Uncomment to use a raw age key instead of KMS.
# apiVersion: v1
# kind: Secret
# metadata:
#   name: age-master-key
#   namespace: kube-system
# stringData:
#   # Generated using `age-keygen`
#   key.txt: "AGE-SECRET-KEY-1..."
# ---
# AWS KMS encrypted age master key ciphertext.
# When using AWS KMS, set KMS_CIPHERTEXT_FILE instead of MASTER_KEY_FILE
# and build the image with --build-arg KMS_ENABLED=true.
# The ciphertext is generated with:
#   aws kms encrypt --key-id <arn> --plaintext fileb://key.txt --output text --query CiphertextBlob
apiVersion: v1
kind: Secret
metadata:
  name: age-kms-ciphertext
  namespace: kube-system
stringData:
  ciphertext: ""
---
# Optional: GCP KMS encrypted age master key ciphertext.
# When using GCP KMS, set GCP_KMS_KEY_NAME_FILE and GCP_KMS_CIPHERTEXT_FILE
# instead of MASTER_KEY_FILE and build with --build-arg GCPKMS_ENABLED=true.
# The ciphertext is generated with:
#   gcloud kms encrypt --location global --keyring my-keyring --key my-key --plaintext-file key.txt --ciphertext-file - | base64 -w0
# apiVersion: v1
# kind: Secret
# metadata:
#   name: age-gcpkms-ciphertext
#   namespace: kube-system
# stringData:
#   ciphertext: "<base64-encoded-blob>"
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: age-gcpkms-key
#   namespace: kube-system
# stringData:
#   keyName: "projects/my-project/locations/global/keyRings/my-keyring/cryptoKeys/my-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-public-key
  namespace: kube-system
stringData:
  # PEM-encoded RSA public key used to validate JWT tokens from the Web UI
  jwt-public-key.pem: |
    -----BEGIN PUBLIC KEY-----
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...
    -----END PUBLIC KEY-----
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: csi-secret-age-perms
  namespace: kube-system
data:
  perm.yaml: |
    admin_users:
      - userH
    user_permissions:
      userA:
        - "/nats/*"
        - "/postgresql/*"
      userB:
        - "/app/*"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-secret-age-sa
  namespace: kube-system
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: csi-secret-age-role
rules:
  # Allows reading and updating the backed Kubernetes Secret containing the Vault
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["csi-secret-age-backend"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: csi-secret-age-binding
subjects:
  - kind: ServiceAccount
    name: csi-secret-age-sa
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: csi-secret-age-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: csi-secret-age
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: csi-secret-age
  template:
    metadata:
      labels:
        app: csi-secret-age
    spec:
      serviceAccountName: csi-secret-age-sa
      hostNetwork: true
      containers:
        - name: csi-driver
          image: ghcr.io/akhenakh/csi-secret-age:latest
          # Built with ko on every main merge. Re-pin to an immutable @sha256 digest once stable.
          imagePullPolicy: Always
          env:
            # - name: MASTER_KEY_FILE
            #   value: /etc/csi-secret-age/secrets/master-key/key.txt
            # AWS KMS: the secret is mounted at /etc/csi-secret-age/secrets/kms
            # and its "ciphertext" key becomes the file below.
            - name: KMS_CIPHERTEXT_FILE
              value: /etc/csi-secret-age/secrets/kms/ciphertext
            # Uncomment to use GCP KMS instead of MASTER_KEY_FILE:
            # - name: GCP_KMS_KEY_NAME_FILE
            #   value: /etc/csi-secret-age/secrets/gcpkms/keyName
            # - name: GCP_KMS_CIPHERTEXT_FILE
            #   value: /etc/csi-secret-age/secrets/gcpkms/ciphertext
            - name: JWT_PUBLIC_KEY_FILE
              value: /etc/csi-secret-age/secrets/jwt/jwt-public-key.pem
            - name: PERM_CONFIG_PATH
              value: /etc/csi-secret-age/perm.yaml
            - name: SOCKET_PATH
              value: /csi/csi-secret-age.sock
          volumeMounts:
            - name: providers-socket-dir
              mountPath: /csi
            - name: perms-config
              mountPath: /etc/csi-secret-age
            - name: kms-ciphertext-secret
              mountPath: /etc/csi-secret-age/secrets/kms
              readOnly: true
            - name: jwt-public-key-secret
              mountPath: /etc/csi-secret-age/secrets/jwt
              readOnly: true
      volumes:
        - name: providers-socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/secrets-store.csi.k8s.io/providers
            type: DirectoryOrCreate
        - name: perms-config
          configMap:
            name: csi-secret-age-perms
        - name: kms-ciphertext-secret
          secret:
            secretName: age-kms-ciphertext
        - name: jwt-public-key-secret
          secret:
            secretName: jwt-public-key
